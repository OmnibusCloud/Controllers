name: Pack

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project to pack (name equals .csproj filename without extension)'
        required: true
        type: choice
        options:
          - OutWit.Controller.Pack

permissions:
  contents: read

jobs:
  pack:
    runs-on: ubuntu-latest
    env:
      PROJECT: ${{ github.event.inputs.project }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Resolve project path
        id: paths
        shell: bash
        run: |
          name="${{ env.PROJECT }}"
          lib=$(find . -name "$name.csproj" -type f | head -1)
          if [ -z "$lib" ]; then
            echo "Project '$name.csproj' not found"
            exit 1
          fi
          echo "libCsproj=$lib" >> $GITHUB_OUTPUT
          echo "Resolved: $lib"

      - name: Build
        run: dotnet build "${{ steps.paths.outputs.libCsproj }}" -c Release -p:ContinuousIntegrationBuild=true

      - name: Pack
        run: dotnet pack "${{ steps.paths.outputs.libCsproj }}" -c Release --no-build

      - name: Collect packages
        shell: bash
        run: |
          mkdir -p NuGet
          find . -path "*/bin/Release/*.nupkg" -exec cp {} NuGet/ \;
          find . -path "*/bin/Release/*.snupkg" -exec cp {} NuGet/ \; 2>/dev/null || true
          echo "Collected packages:"
          ls -la NuGet/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ env.PROJECT }}
          path: NuGet/*
          if-no-files-found: error
