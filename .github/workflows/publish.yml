name: Publish
run-name: "Publish: ${{ inputs.project }}"

# Unified publish workflow for everything in this repo.
#
# Supports three project shapes via the same pipeline:
#
#   * Controllers   (OutWit.Controller.<Name>)
#       Tier-2 controllers may also produce a GitHub Release with attached
#       data assets (rowMatrix.smat for Matrices today; Blender / FFmpeg
#       per platform for Render later). Asset prep is keyed off the project
#       name — controllers without external assets are no-op for that step.
#
#   * Models        (OutWit.Controller.<Name>.Model)
#       Regular library NuGets. No GH Release.
#
#   * Tools         (OutWit.Controller.Pack)
#       Global .NET tools. No GH Release.

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project to publish (.csproj base name)'
        required: true
        type: choice
        options:
          # Controllers
          - OutWit.Controller.Grid
          - OutWit.Controller.Variables
          - OutWit.Controller.Special
          - OutWit.Controller.Matrices
          - OutWit.Controller.Render
          - OutWit.Controller.Render.Dcc
          # Models
          - OutWit.Controller.Grid.Model
          - OutWit.Controller.Variables.Model
          - OutWit.Controller.Matrices.Model
          - OutWit.Controller.Render.Model
          - OutWit.Controller.Render.Dcc.Model
          # Scripts (content-only nupkgs that ship bundled .wit scripts)
          - OutWit.Controller.Matrices.Scripts
          - OutWit.Controller.Render.Scripts
          - OutWit.Controller.Render.Dcc.Scripts
          # Tools
          - OutWit.Controller.Pack
      pushToNuGet:
        description: 'Push nupkg + snupkg to nuget.org'
        type: boolean
        required: true
        default: true
      pushToGitHubPackages:
        description: 'Push nupkg to GitHub Packages'
        type: boolean
        required: true
        default: true
      createGitHubRelease:
        description: 'Create GitHub Release with prepared assets (no-op for projects without external assets)'
        type: boolean
        required: true
        default: true

permissions:
  contents: write   # action-gh-release needs to create tags + releases
  packages: write   # GitHub Packages push

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PROJECT: ${{ github.event.inputs.project }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # Find csproj by name (mirrors the WitEngine publish.yml pattern).
      # Also extracts Version and computes a tag prefix used for GH Release
      # naming. The tag-prefix transform turns OutWit.Controller.Render.Dcc
      # into 'renderdcc' (matches the existing manual matrices-v1.0.0 tag
      # convention).
      - name: Resolve project path
        id: paths
        shell: bash
        run: |
          name="${{ env.PROJECT }}"
          csproj=$(find . -name "$name.csproj" -type f | head -1)
          if [ -z "$csproj" ]; then
            echo "ERROR: csproj not found for project '$name'"
            exit 1
          fi

          version=$(grep -oP '<Version>\K[^<]+' "$csproj" | head -1)
          if [ -z "$version" ]; then
            echo "ERROR: <Version> not found in $csproj"
            exit 1
          fi

          # OutWit.Controller.Foo -> foo; OutWit.Controller.Render.Dcc -> renderdcc
          tag_prefix=$(echo "$name" | sed 's/^OutWit\.Controller\.//' | tr -d '.' | tr '[:upper:]' '[:lower:]')

          # The asset release tag is whatever the csproj's gh-release:// URIs
          # actually point at — NOT a value recomputed from <Version>. Asset
          # versions are independent of the controller version: a controller
          # bump that doesn't change the binary assets keeps pointing at the
          # existing release, so we never re-upload unchanged assets. Falls back
          # to the version-derived tag for projects with no asset URIs.
          asset_tag=$(grep -oP 'gh-release://[^/]+/[^/]+/\K[^/]+' "$csproj" | head -1)
          if [ -z "$asset_tag" ]; then asset_tag="$tag_prefix-v$version"; fi

          echo "csproj=$csproj"        >> $GITHUB_OUTPUT
          echo "version=$version"      >> $GITHUB_OUTPUT
          echo "tag=$tag_prefix-v$version" >> $GITHUB_OUTPUT
          echo "asset_tag=$asset_tag"  >> $GITHUB_OUTPUT

          echo "Resolved:"
          echo "  csproj    = $csproj"
          echo "  version   = $version"
          echo "  tag       = $tag_prefix-v$version"
          echo "  asset_tag = $asset_tag  (from csproj gh-release:// URIs)"

      # SolutionDir is referenced by controller csprojs (PostBuild + PackZip
      # targets stage into $(SolutionDir)@Controllers/ and $(SolutionDir)@Zips/).
      # When MSBuild builds a single csproj instead of the whole slnx,
      # $(SolutionDir) defaults to '*Undefined*' and the paths corrupt. Pass
      # it explicitly using the runner's workspace root (trailing slash required).
      - name: Build
        shell: bash
        run: dotnet build "${{ steps.paths.outputs.csproj }}" -c Release -p:ContinuousIntegrationBuild=true -p:SolutionDir="${GITHUB_WORKSPACE}/"

      - name: Pack
        shell: bash
        run: dotnet pack "${{ steps.paths.outputs.csproj }}" -c Release --no-build -p:SolutionDir="${GITHUB_WORKSPACE}/"

      - name: Collect nupkg / snupkg
        id: collect
        shell: bash
        run: |
          mkdir -p NuGet
          find . -path "*/bin/Release/${{ env.PROJECT }}.${{ steps.paths.outputs.version }}.nupkg"  -exec cp {} NuGet/ \;
          find . -path "*/bin/Release/${{ env.PROJECT }}.${{ steps.paths.outputs.version }}.snupkg" -exec cp {} NuGet/ \; 2>/dev/null || true

          hasNupkg=false
          hasSnupkg=false
          if ls NuGet/*.nupkg  > /dev/null 2>&1; then hasNupkg=true; fi
          if ls NuGet/*.snupkg > /dev/null 2>&1; then hasSnupkg=true; fi
          echo "hasNupkg=$hasNupkg"   >> $GITHUB_OUTPUT
          echo "hasSnupkg=$hasSnupkg" >> $GITHUB_OUTPUT

          echo "Collected:"
          ls -la NuGet/ || echo "  (none)"

      # Per-controller asset preparation. Each Tier-2 controller has its own
      # logic for producing the binary blobs that go in the GitHub Release.
      # Models and tools fall through the *) branch (no-op).
      - name: Prepare assets
        id: assets
        shell: bash
        run: |
          mkdir -p dist

          case "${{ env.PROJECT }}" in
            OutWit.Controller.Matrices)
              # Step 10b — both benchmark matrices are external assets, uploaded
              # to the release named by the csproj gh-release:// URIs (asset_tag).
              # Only stage them for upload if that release does NOT already exist:
              # the .smat files are independent of the controller version, so a
              # version bump that leaves the URIs on the existing tag must NOT
              # re-upload unchanged assets (the existing release already serves
              # consumers). Re-upload happens only when asset_tag is a new tag.
              asset_tag="${{ steps.paths.outputs.asset_tag }}"
              code=$(curl -s -L -o /dev/null -w "%{http_code}" "https://github.com/${{ github.repository }}/releases/download/${asset_tag}/rowMatrix.smat")
              if [ "$code" = "200" ]; then
                echo "(Matrices assets already published on release '${asset_tag}'; skipping re-upload.)"
              else
                echo "(Matrices assets not found on '${asset_tag}'; staging for upload.)"
                cp Matrices/OutWit.Controller.Matrices/Resources/rowMatrix.smat dist/
                cp Matrices/OutWit.Controller.Matrices/Resources/largeMatrix.smat dist/
              fi
              ;;
            OutWit.Controller.Render)
              # Render Tier-2: author publishes the GitHub Release locally
              # using outwit-assets-pack BEFORE triggering this workflow.
              # The release must already exist with the 9 expected artifacts;
              # this case-branch only verifies that, it does not upload.
              echo "(Render assets are author-uploaded via outwit-assets-pack; verifying release...)"
              ;;
            *)
              echo "(no external assets for ${{ env.PROJECT }})"
              ;;
          esac

          hasAssets=false
          if ls dist/* > /dev/null 2>&1; then hasAssets=true; fi
          echo "hasAssets=$hasAssets" >> $GITHUB_OUTPUT

          if [ "$hasAssets" = "true" ]; then
            echo "Prepared assets:"
            ls -la dist/
            echo ""
            echo "SHA256:"
            sha256sum dist/*

            # Markdown release body matching the manual-release look.
            {
              echo "Automated release for **${{ env.PROJECT }}** v${{ steps.paths.outputs.version }}."
              echo ""
              echo "Published by the publish workflow (commit \`${{ github.sha }}\`)."
              echo ""
              echo "## Assets"
              echo ""
              echo "| File | Size | SHA256 |"
              echo "| --- | --- | --- |"
              for f in dist/*; do
                fname=$(basename "$f")
                size=$(stat --printf="%s" "$f")
                sha=$(sha256sum "$f" | awk '{print $1}')
                if   [ "$size" -lt 1024 ];               then size_h="${size} B";
                elif [ "$size" -lt $((1024*1024)) ];     then size_h="$((size/1024)) KB";
                elif [ "$size" -lt $((1024*1024*1024)) ]; then size_h="$((size/1024/1024)) MB";
                else                                          size_h="$((size/1024/1024/1024)) GB";
                fi
                echo "| \`${fname}\` | ${size_h} | \`${sha}\` |"
              done
            } > dist-release-body.md
          fi

      - name: Create GitHub Release
        if: inputs.createGitHubRelease && steps.assets.outputs.hasAssets == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.paths.outputs.asset_tag }}
          name: "${{ env.PROJECT }} v${{ steps.paths.outputs.version }}"
          body_path: dist-release-body.md
          files: dist/*
          fail_on_unmatched_files: true
          make_latest: legacy

      # Render (and any future Tier-2 controller that author-uploads its
      # release) ships a nupkg whose controller.json references gh-release://
      # URIs. If the release tag doesn't exist or any expected asset is
      # missing, the published nupkg is broken for every consumer. Fail
      # loudly BEFORE the nuget.org push so we never end up in that state.
      - name: Verify Tier-2 release assets exist (Render)
        if: inputs.pushToNuGet && env.PROJECT == 'OutWit.Controller.Render'
        shell: bash
        run: |
          set -e
          tag="${{ steps.paths.outputs.asset_tag }}"
          expected=(
            blender-windows-x64.zip
            blender-linux-x64.zip
            blender-macos-arm64.zip
            ffmpeg-windows-x64.zip
            ffmpeg-linux-x64.zip
            ffmpeg-macos-arm64.zip
            benchmark_scene.blend
            benchmark_scene_still.blend
            benchmark_scene_video.blend
          )
          missing=0
          for asset in "${expected[@]}"; do
            url="https://github.com/${{ github.repository }}/releases/download/${tag}/${asset}"
            code=$(curl -s -L -o /dev/null -w "%{http_code}" "$url")
            if [ "$code" = "200" ]; then
              echo "  OK   $asset"
            else
              echo "  FAIL $asset  (HTTP $code at $url)"
              missing=$((missing+1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo ""
            echo "::error::$missing asset(s) missing on release '$tag'. Run outwit-assets-pack --push-release locally first."
            exit 1
          fi

      - name: Add GitHub Packages source
        if: inputs.pushToGitHubPackages
        run: >
          dotnet nuget add source
          --username ${{ github.actor }}
          --password ${{ secrets.GITHUB_TOKEN }}
          --store-password-in-clear-text
          --name github
          "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Push nupkg to nuget.org
        if: inputs.pushToNuGet && steps.collect.outputs.hasNupkg == 'true'
        shell: bash
        run: dotnet nuget push NuGet/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push snupkg to nuget.org
        if: inputs.pushToNuGet && steps.collect.outputs.hasSnupkg == 'true'
        shell: bash
        run: dotnet nuget push NuGet/*.snupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push nupkg to GitHub Packages
        if: inputs.pushToGitHubPackages && steps.collect.outputs.hasNupkg == 'true'
        shell: bash
        run: dotnet nuget push NuGet/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source github --skip-duplicate

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT }}-v${{ steps.paths.outputs.version }}
          path: |
            NuGet/*
            dist/*
            dist-release-body.md
          if-no-files-found: ignore
          retention-days: 7
